<!doctype html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookshelf App</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Impor script kamu di sini -->
    <!-- Lampirkan `defer` jika pemanggilan dilakukan dalam <head> -->
    <script src="main.js"></script>
  </head>
  <body>
    <header>
      <h1>Bookshelf App</h1>
    </header>

    <main>
      <section class="form-section">
        <h2>Tambah Buku Baru</h2>
        <form class="form" id="bookForm" data-testid="bookForm">
          <div class="form-group">
            <label for="bookFormTitle">Judul</label>
            <input
              id="bookFormTitle"
              type="text"
              required
              data-testid="bookFormTitleInput"
            />
          </div>
          <div class="form-group">
            <label for="bookFormAuthor">Penulis</label>
            <input
              id="bookFormAuthor"
              type="text"
              required
              data-testid="bookFormAuthorInput"
            />
          </div>
          <div class="form-group">
            <label for="bookFormYear">Tahun</label>
            <input
              id="bookFormYear"
              type="number"
              required
              data-testid="bookFormYearInput"
            />
          </div>
          <div class="checkbox">
            <label for="bookFormIsComplete">Selesai dibaca</label>
            <input
              id="bookFormIsComplete"
              type="checkbox"
              data-testid="bookFormIsCompleteCheckbox"
            />
          </div>
          <button
            id="bookFormSubmit"
            type="submit"
            data-testid="bookFormSubmitButton"
          >
            Masukkan Buku ke rak
            <span style="font-weight: bold">Belum selesai dibaca</span>
          </button>
        </form>
      </section>

      <section class="form-section find-book">
        <h2>Cari Buku</h2>
        <div class="search-wrap">
          <form
            class="search-form"
            id="searchBook"
            data-testid="searchBookForm"
          >
            <label for="searchBookTitle">Judul</label>
            <input
              id="searchBookTitle"
              type="text"
              data-testid="searchBookFormTitleInput"
            />
            <button
              id="searchSubmit"
              type="submit"
              data-testid="searchBookFormSubmitButton"
            >
              Cari
            </button>
          </form>
        </div>
      </section>

      <section>
        <h2>Belum selesai dibaca</h2>

        <div id="incompleteBookList" data-testid="incompleteBookList">
          <!-- 
            Ini adalah struktur HTML untuk masing-masing buku.
            Pastikan susunan elemen beserta atribut data-testid menyesuaikan seperti contoh ini.
          -->
        </div>
      </section>

      <section>
        <h2>Selesai dibaca</h2>

        <div id="completeBookList" data-testid="completeBookList">
          <!-- 
            Ini adalah struktur HTML untuk masing-masing buku.
            Pastikan susunan elemen beserta atribut data-testid menyesuaikan seperti contoh ini.
          -->
        </div>
      </section>
    </main>
    <template class="book-card" id="bookCard">
      <div data-testid="bookItem" class="list-item" id="books">
        <h3 data-testid="bookItemTitle" class="title"></h3>
        <p data-testid="bookItemAuthor" class="author"></p>
        <p data-testid="bookItemYear" class="year"></p>
        <div class="button-card">
          <button data-testid="bookItemIsCompleteButton" class="completedBtn">
            Selesai dibaca
          </button>
          <button data-testid="bookItemDeleteButton" class="removeBtn">
            Hapus Buku
          </button>
          <button data-testid="bookItemEditButton" class="editBtn">
            Edit Buku
          </button>
        </div>
      </div>
      <form class="edit-form" id="editForm" hidden>
        <div class="form-group">
          <label for="bookFormTitle">Judul</label>
          <input
            id="bookEditFormTitle"
            name="title"
            type="text"
            required
            data-testid="bookFormTitleInput"
          />
        </div>
        <div class="form-group">
          <label for="bookFormAuthor">Penulis</label>
          <input
            id="bookEditFormAuthor"
            name="author"
            type="text"
            required
            data-testid="bookFormAuthorInput"
          />
        </div>
        <div class="form-group">
          <label for="bookEditFormYear">Tahun</label>
          <input
            id="bookEditFormYear"
            type="number"
            name="year"
            required
            data-testid="bookFormYearInput"
          />
          <button
            id="editFormSubmit"
            type="submit"
            data-testid="bookFormSubmitButton"
          >
            Submit
          </button>
        </div>
      </form>
    </template>
  </body>
</html>
